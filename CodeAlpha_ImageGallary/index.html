<!DOCTYPE html>
<html>
<head>
    <title>Food Menu</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<nav>
    <button onclick="showSection('noodles')">Noodles</button>
    <button onclick="showSection('briyani')">Briyani</button>
    <button onclick="showSection('snacks')">Snacks</button>
    <button onclick="showSection('drinks')">Drinks</button>
    <button onclick="showSection('gravy')">Gravy</button>
</nav>

<div class="container">

    <!-- NOODLES -->
    <section id="noodles" class="page active">
        <h1>Noodles</h1>
        <div class="gallery">
            <img src="images/chickennoodles.jpg">
            <img src="images/eggnoodles.jpg">
            <img src="images/vegnoodles.jpg">
            <img src="images/paneernoodles.jpg">
            <img src="images/schezwannoodles.jpg">
        </div>
    </section>

    <!-- BRIYANI -->
    <section id="briyani" class="page">
        <h1>Briyani</h1>
        <div class="gallery">
            <img src="images/chickenbriyani.jpg">
            <img src="images/muttonbriyani.jpg">
            <img src="images/eggbriyani.jpg">
            <img src="images/prawnbriyani.jpg">
            <img src="images/fishbriyani.jpg">
        </div>
    </section>

    <!-- SNACKS -->
    <section id="snacks" class="page">
        <h1>Spicy Snacks</h1>
        <div class="gallery">
            <img src="images/breadroll.jpg">
            <img src="images/cutlet.jpg">
            <img src="images/vegsandwich.jpg">
            <img src="images/pavbhaji.jpg">
            <img src="images/momos.jpg">
            <img src="images/pizza.jpg">
            <img src="images/panipuri.jpg">
            <img src="images/fries.jpg">
            <img src="images/burger.jpg">
            <img src="images/shawarma.jpg">
            <img src="images/kfc.jpg">
        </div>
    </section>

    <!-- DRINKS -->
    <section id="drinks" class="page">
        <h1>Drinks</h1>
        <div class="gallery">
            <img src="images/milkshake.jpg">
            <img src="images/smoothies.jpg">
            <img src="images/cooldrinks.jpg">
            <img src="images/hotdrinks.jpg">
        </div>
    </section>

    <!-- GRAVY -->
    <section id="gravy" class="page">
        <h1>Gravy / Curry</h1>
        <div class="gallery">
            <img src="images/chickengravy.jpg">
            <img src="images/muttongravy.jpg">
            <img src="images/paneergravy.jpg">
            <img src="images/mushroomgravy.jpg">
            <img src="images/egggravy.jpg">
        </div>
    </section>

</div>

<script src="script.js"></script>
</body>
</html>
